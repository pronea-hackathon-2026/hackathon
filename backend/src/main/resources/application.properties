# Server
server.port=8000

# H2 file-based database (persists between restarts in ./data/)
spring.datasource.url=jdbc:h2:file:./data/talentlens;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# H2 dialect auto-detected
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JSON snake_case (matches TypeScript interfaces)
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.default-property-inclusion=NON_NULL

# File uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Gemini API
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.base-url=https://generativelanguage.googleapis.com/v1beta

# Seed demo data on first startup
talentlens.seed.enabled=true
spring.jpa.open-in-view=false
